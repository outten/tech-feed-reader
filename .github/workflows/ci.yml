name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel in-flight CI on a branch when a newer push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: RSpec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RACK_ENV: test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/tfr_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       tfr_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Reads .ruby-version. bundler-cache: true caches the gem bundle keyed on
      # Gemfile.lock so warm runs are fast.
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # The full RSpec suite loads every app/*.rb at boot, which catches Ruby
      # syntax errors in the application code. The scripts/ files aren't
      # loaded by tests, so we syntax-check them here so a typo in
      # scheduler.rb / refresh_*.rb is caught at CI time rather than at next
      # cron tick.
      - name: Ruby syntax check (scripts)
        run: |
          set +e
          fail=0
          if [ -d scripts ]; then
            while IFS= read -r f; do
              out=$(ruby -c "$f" 2>&1)
              if [ $? -ne 0 ]; then
                echo "::error file=$f::$out"
                fail=1
              fi
            done < <(find scripts -name '*.rb' -type f)
          fi
          exit $fail

      - name: Dependency audit (bundler-audit)
        run: |
          set +e
          bundle exec bundle-audit check --update > /tmp/audit.txt 2>&1
          cat /tmp/audit.txt
          if grep -qiE "^Criticality: (High|Critical)" /tmp/audit.txt; then
            echo "HIGH/CRITICAL vulnerabilities found — failing CI."
            exit 1
          fi
          echo "No HIGH/CRITICAL vulnerabilities (LOW/MEDIUM are advisory only)."
          exit 0

      - name: Run RSpec
        run: bundle exec rspec --color --format documentation

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI result"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "✅ All checks passed."
            else
              echo "❌ One or more checks failed — see logs above."
            fi
            echo ""
            echo "_Branch: \`${{ github.ref_name }}\` · Commit: \`${{ github.sha }}\`_"
          } >> "$GITHUB_STEP_SUMMARY"
