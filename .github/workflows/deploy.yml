name: Deploy

# Trigger on version tags pushed by `make release-patch/minor/major`.
# The local Makefile bumps VERSION, commits, tags, and pushes —
# this workflow runs tests first, then builds and deploys only if they pass.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

# Only one deploy at a time — queue newer tags behind the running one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: registry.digitalocean.com/tfr
  IMAGE: tech-feed-reader

jobs:
  test:
    name: RSpec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RACK_ENV: test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/tfr_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       tfr_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Ruby syntax check (scripts)
        run: |
          set +e
          fail=0
          if [ -d scripts ]; then
            while IFS= read -r f; do
              out=$(ruby -c "$f" 2>&1)
              if [ $? -ne 0 ]; then
                echo "::error file=$f::$out"
                fail=1
              fi
            done < <(find scripts -name '*.rb' -type f)
          fi
          exit $fail

      - name: Run RSpec
        run: bundle exec rspec --color --format progress

  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: cd /opt/app && make deploy

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Deploy ${{ github.ref_name }}"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "✅ v${{ steps.version.outputs.version }} deployed to production."
            else
              echo "❌ Deploy failed — check logs above."
            fi
            echo ""
            echo "_Tag: \`${{ github.ref_name }}\` · Commit: \`${{ github.sha }}\`_"
          } >> "$GITHUB_STEP_SUMMARY"
