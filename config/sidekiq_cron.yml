# Recurring background jobs loaded by sidekiq-cron at worker boot.
# Cron expressions are evaluated in the process timezone (UTC on the
# Droplet). Edit + redeploy the sidekiq container to pick up changes.
#
# Schedule overview:
#   - refresh_all_feeds — hourly fan-out (mirrors the /refresh/all
#     button). Each tick enqueues one FeedRefreshWorker per feed.
#   - sports_sync       — nightly sweep of match schedules + league
#     standings + ATP/WTA rankings. 04:00 UTC keeps the Droplet quiet
#     during US prime-time games and finalises overnight scores.

refresh_all_feeds:
  cron: "0 * * * *"
  class: "RefreshAllFeedsWorker"
  queue: default
  description: "Hourly: enqueue FeedRefreshWorker for every subscribed feed."

sports_sync:
  cron: "30 * * * *"
  class: "SportsSyncWorker"
  queue: default
  description: "Hourly :30 UTC: ESPN match schedules + league standings + tennis rankings. Offset from feeds cron (:00) to spread load."

generate_sudoku:
  cron: "0 1 * * *"
  class: "GenerateSudokuWorker"
  queue: default
  description: "Daily 01:00 UTC: pre-generate the next 7 days of Sudoku puzzles so /games/sudoku always has a puzzle ready."

generate_trivia:
  cron: "30 1 * * *"
  class: "GenerateTriviaWorker"
  queue: default
  description: "Daily 01:30 UTC: generate today's News Trivia quiz from the last 24h of articles."

fix_article_links:
  cron: "45 4 * * *"
  class: "FixArticleLinksWorker"
  queue: default
  description: "Daily 04:45 UTC: re-scrub any article content_html flagged content_scrubbed = FALSE. Steady-state no-op; safety net for imports that bypass Sanitizer's base_url path."
