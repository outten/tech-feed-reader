# Production stack for the Droplet — app + sidekiq worker + redis +
# caddy reverse-proxy. Run as:
#
#   docker compose up -d        # start
#   docker compose pull && docker compose up -d  # deploy a new version
#   docker compose logs -f app  # follow app logs
#
# Required env vars (set in /opt/app/.env on the Droplet, never committed):
#   DOMAIN, CADDY_EMAIL, SESSION_SECRET, WEBAUTHN_RP_ID, WEBAUTHN_ORIGIN,
#   ANTHROPIC_API_KEY, DATABASE_URL, API_SPORTS_KEY. LLM_* and WEBAUTHN_RP_NAME are
#   optional (have defaults). See .env.example for the full list.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    # Primary path (production): pull a versioned image from
    # DigitalOcean Container Registry. IMAGE_TAG defaults to 'latest';
    # set IMAGE_TAG=0.9.3 in /opt/app/.env for a tag-pinned rollback.
    # IMAGE_REGISTRY can be overridden if the registry name ever moves.
    image: ${IMAGE_REGISTRY:-registry.digitalocean.com/tfr}/tech-feed-reader:${IMAGE_TAG:-latest}
    # Escape hatch: `docker compose build app` still works locally
    # (Colima dev, the pre-DOCR Droplet fallback) and produces an
    # image tagged with the same name, so `up -d` afterwards uses
    # the local build without going to the registry. APP_VERSION
    # threads through to the OCI label + AppVersion::SEMVER constant.
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-unknown}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RACK_ENV: production
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Tech Feed Reader}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_USER_DAILY_TOKEN_BUDGET: ${LLM_USER_DAILY_TOKEN_BUDGET:-200000}
      LLM_GLOBAL_HOURLY_TOKEN_BUDGET: ${LLM_GLOBAL_HOURLY_TOKEN_BUDGET:-2000000}
      LLM_GLOBAL_HOURLY_COST_BUDGET: ${LLM_GLOBAL_HOURLY_COST_BUDGET:-5.00}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      BMC_HANDLE: ${BMC_HANDLE:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      API_SPORTS_KEY: ${API_SPORTS_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      NTFY_URL: ${NTFY_URL:-}
    expose:
      - "4567"

  sidekiq:
    # Same image as `app` (one container, two entrypoints — Sidekiq
    # uses the `command:` override below). Pulled from DOCR or built
    # locally; either way `app`'s build step ran first so the image is
    # already cached by the time compose creates this service.
    image: ${IMAGE_REGISTRY:-registry.digitalocean.com/tfr}/tech-feed-reader:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      RACK_ENV: production
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      API_SPORTS_KEY: ${API_SPORTS_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      NTFY_URL: ${NTFY_URL:-}
    command: ["bundle", "exec", "sidekiq", "-r", "./app/sidekiq_boot.rb", "-c", "5"]
    # The app image's HEALTHCHECK curls the web server's /health on :4567 —
    # correct for the `app` service, but this container runs the Sidekiq
    # worker (no web server on :4567), so it always reported "unhealthy".
    # Disable it: liveness here is the worker being PID 1 + restart:
    # unless-stopped (a crash exits the container and Compose restarts it),
    # and the app's /health endpoint already reports the registered Sidekiq
    # worker count for external monitoring. (A meaningful in-container probe
    # would have to boot Ruby every interval — too heavy for the worker box.)
    healthcheck:
      disable: true

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  redis_data:
  caddy_data:
  caddy_config:
